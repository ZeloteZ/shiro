name: Build application

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: npm run dist:linux
            artifact_name: shiro-linux
          - os: windows-latest
            command: npm run dist:win
            artifact_name: shiro-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build application
        run: ${{ matrix.command }}

      - name: Smoke test Linux packages
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail

          deb_file="$(find dist -maxdepth 1 -name '*.deb' | head -n 1)"
          appimage_file="$(find dist -maxdepth 1 -name '*.AppImage' | head -n 1)"

          test -n "$deb_file"
          test -n "$appimage_file"

          deb_unpack_dir="$(mktemp -d)"
          dpkg-deb -x "$deb_file" "$deb_unpack_dir"
          deb_desktop_file="$(find "$deb_unpack_dir" -path '*/applications/*.desktop' | head -n 1)"
          test -n "$deb_desktop_file"
          grep -q '^MimeType=.*x-scheme-handler/shiro;' "$deb_desktop_file"

          appimage_abs_path="$(realpath "$appimage_file")"
          appimage_extract_dir="$(mktemp -d)"
          chmod +x "$appimage_abs_path"
          (
            cd "$appimage_extract_dir"
            "$appimage_abs_path" --appimage-extract >/dev/null
          )
          appimage_desktop_file="$(find "$appimage_extract_dir/squashfs-root" -name '*.desktop' | head -n 1)"
          test -n "$appimage_desktop_file"
          grep -q '^MimeType=.*x-scheme-handler/shiro;' "$appimage_desktop_file"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.exe
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: shiro-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-artifacts
          sha256sum *.AppImage *.deb *.exe > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.AppImage
            release-artifacts/*.deb
            release-artifacts/*.exe
            release-artifacts/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
